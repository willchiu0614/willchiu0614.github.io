<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>身體症狀標記器 - 分頁一</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  

  <div class="tab-content" style="display: block;">
    <!-- 身體部位 -->
    <div class="row">
      <img src="./src/person.png" alt="頭" class="img-btn" data-group="body" data-label="頭" data-sound="audio/head.wav" onclick="playSound(this)">
      <img src="./src/neck.png" alt="脖子" class="img-btn" data-group="body" data-label="脖子" data-sound="audio/neck.wav" onclick="playSound(this)">
      <img src="./src/upper-body.png" alt="胸" class="img-btn" data-group="body" data-label="胸" data-sound="audio/body.wav" onclick="playSound(this)">
      <img src="./src/back-body.png" alt="背" class="img-btn" data-group="body" data-label="背" data-sound="audio/backside.wav" onclick="playSound(this)">
      <img src="./src/muscle.png" alt="手臂" class="img-btn" data-group="body" data-label="手臂" data-sound="audio/arm.wav" onclick="playSound(this)">
      <img src="./src/thighs.png" alt="大腿" class="img-btn" data-group="body" data-label="大腿" data-sound="audio/thigh.wav" onclick="playSound(this)">
      <img src="./src/leg.png" alt="小腿" class="img-btn" data-group="body" data-label="小腿" data-sound="audio/leg.wav" onclick="playSound(this)">
      <img src="./src/foot.png" alt="腳" class="img-btn" data-group="body" data-label="腳" data-sound="audio/foot.wav" onclick="playSound(this)">
    </div>

    <!-- 方向 -->
    <div class="row">
      <img src="./src/arrow.png" alt="左半身" class="img-btn" data-group="side" data-label="左半身" data-sound="audio/left.wav" onclick="playSound(this)">
      <img src="./src/right-arrow.png" alt="右半身" class="img-btn" data-group="side" data-label="右半身" data-sound="audio/right.wav" onclick="playSound(this)">
    </div>

    <!-- 痠痛癢 -->
    <div class="row">
      <img src="./src/itching.png" alt="癢" class="img-btn" data-group="symptom" data-label="癢" data-sound="audio/itching.wav" onclick="playSound(this)">
      <img src="./src/back.png" alt="痠痛" class="img-btn" data-group="symptom" data-label="痠痛" data-sound="audio/back.wav" onclick="playSound(this)">
    </div>

    <!-- 播放和清除選擇的按鈕 -->
    <div class="controls">
      <img src="./src/confirm.png"  class="img-btn"  onclick="playSelectedSounds()">
      <img src="./src/clean.png"  class="img-btn"  onclick="clearSelections()">
    </div>

    <div id="result" class="result-area"></div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
