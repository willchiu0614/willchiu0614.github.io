<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>身體症狀標記器 - 分頁二</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  

  <div class="tab-content" style="display: block;">
    <div class="row">
        <img src="./src/drink.png" alt="喝水" class="img-btn" data-group="need" data-label="喝水" data-sound="audio/drink.wav" onclick="playSound(this)">
        <img src="./src/pee.png" alt="廁所" class="img-btn" data-group="need" data-label="廁所" data-sound="audio/pee.wav" onclick="playSound(this)">
      </div>
  
      <!-- 播放和清除選擇的按鈕 -->
      <div class="controls">
        <img src="./src/confirm.png"  class="img-btn"  onclick="playSelectedSounds()">
        <img src="./src/clean.png"  class="img-btn"  onclick="clearSelections()">
      </div>
  
      <div id="result" class="result-area"></div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
