<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>身體症狀標記 - 主頁</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    iframe {
      width: 100%;
      height: 750px;
      border: none;
    }
  </style>
</head>
<body>
  <!-- Tab 選單列 -->
  <div class="row">
    <button class="tab-btn active" onclick="showTab(0)">1</button>
    <button class="tab-btn" onclick="showTab(1)">2</button>
    <button class="tab-btn" onclick="showTab(2)">3</button>
  </div>

  <!-- Tab 內容載入處 -->
  <iframe id="tab-frame" src="page1.html"></iframe>

  <!-- 切換分頁用 Script -->
  <script>
    function showTab(index) {
      const tabButtons = document.querySelectorAll(".tab-btn");
      const pages = ["page1.html", "page2.html", "page3.html"];

      tabButtons.forEach((btn, i) => {
        btn.classList.toggle("active", i === index);
      });

      document.getElementById("tab-frame").src = pages[index];
    }
  </script>
</body>
</html>
